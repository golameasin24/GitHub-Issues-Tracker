<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-sm text-center">
        <!-- GitHub Icon -->
        <div class="flex justify-center mb-6">
            <svg class="w-16 h-16 text-black" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" 
                      d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 
                      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
                      -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89
                      -3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27
                      2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
                      0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.013
                      8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z">
                </path>
            </svg>
        </div>

        <h1 class="text-xl font-semibold mb-2">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-6">Sign in to manage your issue</p>

        <!-- Form -->
        <form class="space-y-4">
            <div class="text-left">
                <label class="block text-gray-600 mb-1">Username</label>
                <input id="user" type="text" placeholder="Enter Username" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
                <p class="text-xs text-purple-600 mt-1">Default: admin</p>
            </div>

            <div class="text-left">
                <label class="block text-gray-600 mb-1">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"/>
                <p class="text-xs text-purple-600 mt-1">Default: admin1234</p>
            </div>

            <button id="btn" type="submit" class="w-full bg-purple-600 text-white py-2 rounded-md hover:bg-purple-700 transition">Sign In</button>
        </form>

        <div class="my-4 flex items-center">
            <hr class="flex-grow border-gray-300">
            <span class="mx-2 text-gray-400 text-sm">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>

        <div class="bg-gray-50 p-3 rounded-md text-gray-700 text-sm">
            <p>Demo Credentials:</p>
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin1234</p>
        </div>
    </div>
  <script>
document.getElementById('btn').addEventListener('click', (e) => {
    e.preventDefault(); 

    const password = document.getElementById('password').value;
    const user = document.getElementById('user').value;

    if (user === "admin" && password === "1234") {
        alert("Sign In successfully");
        window.location.assign('/login.html'); 
    } else {
        alert("Invalid User Name Or Password");
    }
});
  </script>

 
</body>
</html>
